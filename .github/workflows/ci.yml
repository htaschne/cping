name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      BINARY_PATH: ./cping

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build
        run: make

      - name: Verify executable
        shell: bash
        run: |
          set -euo pipefail
          test -f "$BINARY_PATH"
          test -x "$BINARY_PATH"
          file "$BINARY_PATH"

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: cping-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.BINARY_PATH }}
          if-no-files-found: error

      - name: Test
        run: make test

      - name: Strict warning build
        run: make strict

      - name: Static analysis
        run: make analyze

      - name: Fuzz smoke
        run: make fuzz-smoke

  sanitize:
    name: Sanitizer tests (Ubuntu clang)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Sanitizer test
        run: make CC=clang sanitize

      - name: UndefinedBehaviorSanitizer test
        run: make CC=clang sanitize-undefined

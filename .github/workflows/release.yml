name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Create archive
        run: tar -czf cping-${{ matrix.platform }}.tar.gz cping README.md LICENSE

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: cping-${{ matrix.platform }}
          path: cping-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cping-*
          merge-multiple: true

      - name: Pick release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git tag --points-at HEAD | sort -V | tail -n 1)"
          if [[ -n "$tag" ]]; then
            echo "version=$tag" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "notes=Release $tag" >> "$GITHUB_OUTPUT"
          else
            short_sha="${GITHUB_SHA::7}"
            echo "version=sha-$short_sha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "notes=Prerelease build from commit $GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          NOTES: ${{ steps.version.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "$VERSION" dist/cping-*.tar.gz \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes "$NOTES" \
            "${args[@]}"
